name: Build Signed APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.6

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "Generating temporary keystore for testing..."
            keytool -genkey -v \
              -keystore app/keystore.jks \
              -alias goodpartner \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass goodpartner123 \
              -keypass goodpartner123 \
              -dname "CN=Good Partner, OU=App, O=Daniel, L=Unknown, S=Unknown, C=AU"
            echo "KEYSTORE_PASSWORD=goodpartner123" >> $GITHUB_ENV
            echo "KEY_ALIAS=goodpartner" >> $GITHUB_ENV
            echo "KEY_PASSWORD=goodpartner123" >> $GITHUB_ENV
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build release APK
        env:
          KEYSTORE_PATH: app/keystore.jks
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
             "dist/GoodPartner-$(date +'%Y%m%d-%H%M').apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoodPartner-APK
          path: dist/*.apk
          retention-days: 30

      - name: Build summary
        run: |
          APK=$(ls dist/*.apk)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## ✅ Build complete!" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **APK** | $(basename $APK) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Install on your phone" >> $GITHUB_STEP_SUMMARY
          echo "1. Tap **Artifacts → GoodPartner-APK** below" >> $GITHUB_STEP_SUMMARY
          echo "2. Unzip and open the APK" >> $GITHUB_STEP_SUMMARY
          echo "3. Settings → Security → Install unknown apps → allow Files app" >> $GITHUB_STEP_SUMMARY
          echo "4. Tap Install!" >> $GITHUB_STEP_SUMMARY
