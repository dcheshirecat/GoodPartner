name: Build Signed APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.6

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Generate the full Android project structure ──────────────────────────
      - name: Create Android project files
        run: |

          # settings.gradle
          cat > settings.gradle << 'EOF'
          rootProject.name = "GoodPartner"
          include ':app'
          EOF

          # root build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.daemon=false
          EOF

          # app/build.gradle
          mkdir -p app
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.goodpartner.app'
              compileSdk 35
              defaultConfig {
                  applicationId "com.goodpartner.app"
                  minSdk 26
                  targetSdk 35
                  versionCode 1
                  versionName "1.0.0"
              }
              signingConfigs {
                  release {
                      storeFile     file(System.getenv("KEYSTORE_PATH") ?: "keystore.jks")
                      storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
                      keyAlias      System.getenv("KEY_ALIAS")         ?: ""
                      keyPassword   System.getenv("KEY_PASSWORD")      ?: ""
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'androidx.webkit:webkit:1.11.0'
              implementation 'com.google.android.material:material:1.12.0'
          }
          EOF

          # app/proguard-rules.pro
          cat > app/proguard-rules.pro << 'EOF'
          -keepclassmembers class * { @android.webkit.JavascriptInterface <methods>; }
          -keepattributes JavascriptInterface
          -keep class com.goodpartner.app.** { *; }
          EOF

          # AndroidManifest.xml
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.GoodPartner"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:windowSoftInputMode="adjustResize"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <receiver android:name=".NotificationReceiver" android:exported="false" />
              </application>
          </manifest>
          EOF

          # MainActivity.java
          mkdir -p app/src/main/java/com/goodpartner/app
          cat > app/src/main/java/com/goodpartner/app/MainActivity.java << 'EOF'
          package com.goodpartner.app;
          import android.annotation.SuppressLint;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.AlarmManager;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;
          import android.os.Bundle;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.Calendar;
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              public static final String CHANNEL_ID = "gp_reminders";
              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  createNotificationChannel();
                  scheduleReminder();
                  webView = findViewById(R.id.webview);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  webView.addJavascriptInterface(new Bridge(this), "NativeBridge");
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }
              public class Bridge {
                  private final Context ctx;
                  Bridge(Context c) { ctx = c; }
                  @JavascriptInterface public String storageGet(String k) {
                      return ctx.getSharedPreferences("gp",MODE_PRIVATE).getString(k,null); }
                  @JavascriptInterface public void storageSet(String k,String v) {
                      ctx.getSharedPreferences("gp",MODE_PRIVATE).edit().putString(k,v).apply(); }
                  @JavascriptInterface public void storageDelete(String k) {
                      ctx.getSharedPreferences("gp",MODE_PRIVATE).edit().remove(k).apply(); }
                  @JavascriptInterface public String storageList(String p) {
                      java.util.Map<String,?> all=ctx.getSharedPreferences("gp",MODE_PRIVATE).getAll();
                      StringBuilder sb=new StringBuilder("["); boolean f=true;
                      for(String key:all.keySet()){if(p==null||p.isEmpty()||key.startsWith(p)){if(!f)sb.append(",");sb.append("\"").append(key.replace("\"","\\\"")).append("\"");f=false;}}
                      return sb.append("]").toString(); }
              }
              private void createNotificationChannel() {
                  if(Build.VERSION.SDK_INT>=Build.VERSION_CODES.O){
                      NotificationChannel c=new NotificationChannel(CHANNEL_ID,"Good Partner",NotificationManager.IMPORTANCE_DEFAULT);
                      ((NotificationManager)getSystemService(NotificationManager.class)).createNotificationChannel(c);
                  }
              }
              private void scheduleReminder() {
                  AlarmManager am=(AlarmManager)getSystemService(Context.ALARM_SERVICE);
                  if(am==null)return;
                  Intent i=new Intent(this,NotificationReceiver.class);
                  i.putExtra("title","Good Partner");
                  i.putExtra("message","Good morning! Time to check in 🌈");
                  PendingIntent pi=PendingIntent.getBroadcast(this,0,i,PendingIntent.FLAG_UPDATE_CURRENT|PendingIntent.FLAG_IMMUTABLE);
                  Calendar cal=Calendar.getInstance();
                  cal.set(Calendar.HOUR_OF_DAY,8);cal.set(Calendar.MINUTE,0);cal.set(Calendar.SECOND,0);
                  if(cal.getTimeInMillis()<System.currentTimeMillis())cal.add(Calendar.DAY_OF_YEAR,1);
                  try{am.setRepeating(AlarmManager.RTC_WAKEUP,cal.getTimeInMillis(),AlarmManager.INTERVAL_DAY,pi);}catch(Exception e){e.printStackTrace();}
              }
              @Override public void onBackPressed(){if(webView!=null&&webView.canGoBack())webView.goBack();else super.onBackPressed();}
          }
          EOF

          # NotificationReceiver.java
          cat > app/src/main/java/com/goodpartner/app/NotificationReceiver.java << 'EOF'
          package com.goodpartner.app;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import androidx.core.app.NotificationCompat;
          public class NotificationReceiver extends BroadcastReceiver {
              @Override public void onReceive(Context context,Intent intent){
                  String title=intent.getStringExtra("title");
                  String msg=intent.getStringExtra("message");
                  if(title==null)title="Good Partner";
                  if(msg==null)msg="Time to check in! 🌈";
                  Intent li=new Intent(context,MainActivity.class);
                  li.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK|Intent.FLAG_ACTIVITY_CLEAR_TOP);
                  PendingIntent pi=PendingIntent.getActivity(context,0,li,PendingIntent.FLAG_UPDATE_CURRENT|PendingIntent.FLAG_IMMUTABLE);
                  NotificationCompat.Builder b=new NotificationCompat.Builder(context,MainActivity.CHANNEL_ID)
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setContentTitle(title).setContentText(msg)
                      .setPriority(NotificationCompat.PRIORITY_DEFAULT)
                      .setContentIntent(pi).setAutoCancel(true).setColor(0xFFff6fb8);
                  NotificationManager nm=(NotificationManager)context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if(nm!=null)nm.notify((int)System.currentTimeMillis(),b.build());
              }
          }
          EOF

          # Layout
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <WebView android:id="@+id/webview"
                  android:layout_width="match_parent" android:layout_height="match_parent"/>
          </FrameLayout>
          EOF

          # Strings + Colors + Theme
          mkdir -p app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">Good Partner</string></resources>' > app/src/main/res/values/strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#ff6fb8</color></resources>' > app/src/main/res/values/colors.xml
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.GoodPartner" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#ff6fb8</item>
                  <item name="android:statusBarColor">#ff6fb8</item>
              </style>
          </resources>
          EOF

          # App icons (pink square PNGs via Python)
          python3 << 'PYEOF'
          import struct, zlib, os
          def png(size,r,g,b):
              def chunk(n,d):
                  c=zlib.crc32(n+d)&0xffffffff
                  return struct.pack('>I',len(d))+n+d+struct.pack('>I',c)
              ihdr=struct.pack('>IIBBBBB',size,size,8,2,0,0,0)
              raw=b'\x00'+bytes([r,g,b]*size)
              data=raw*size
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',ihdr)+chunk(b'IDAT',zlib.compress(data))+chunk(b'IEND',b'')
          for folder,size in [('mdpi',48),('hdpi',72),('xhdpi',96),('xxhdpi',144),('xxxhdpi',192)]:
              path=f'app/src/main/res/mipmap-{folder}'
              os.makedirs(path,exist_ok=True)
              d=png(size,255,111,184)
              open(f'{path}/ic_launcher.png','wb').write(d)
              open(f'{path}/ic_launcher_round.png','wb').write(d)
          print("Icons OK")
          PYEOF

          # Assets — copy index.html from repo if present, otherwise use placeholder
          mkdir -p app/src/main/assets
          if [ -f "app/src/main/assets/index.html" ]; then
            echo "index.html already in place ✓"
          elif [ -f "index.html" ]; then
            cp index.html app/src/main/assets/index.html
            echo "Copied index.html from repo root ✓"
          else
            echo "<h1>Good Partner loading...</h1>" > app/src/main/assets/index.html
            echo "WARNING: No index.html found — used placeholder"
          fi

          echo "Project structure ready ✓"

      # ── Keystore ─────────────────────────────────────────────────────────────
      - name: Set up keystore
        run: |
          mkdir -p app
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "Generating temporary keystore..."
            keytool -genkey -v \
              -keystore app/keystore.jks \
              -alias goodpartner \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass goodpartner123 -keypass goodpartner123 \
              -dname "CN=Good Partner, OU=App, O=Daniel, L=Unknown, S=Unknown, C=AU"
            echo "KEYSTORE_PASSWORD=goodpartner123" >> $GITHUB_ENV
            echo "KEY_ALIAS=goodpartner" >> $GITHUB_ENV
            echo "KEY_PASSWORD=goodpartner123" >> $GITHUB_ENV
          fi
          echo "Keystore: $(wc -c < app/keystore.jks) bytes ✓"

      # ── Cache ─────────────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build release APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # ── Upload ────────────────────────────────────────────────────────────────
      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
             "dist/GoodPartner-$(date +'%Y%m%d-%H%M').apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoodPartner-APK
          path: dist/*.apk
          retention-days: 30

      - name: Build summary
        run: |
          APK=$(ls dist/*.apk)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## ✅ Build complete!" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **APK** | $(basename $APK) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Install" >> $GITHUB_STEP_SUMMARY
          echo "1. Tap **Artifacts → GoodPartner-APK** below" >> $GITHUB_STEP_SUMMARY
          echo "2. Unzip → open the APK on your phone" >> $GITHUB_STEP_SUMMARY
          echo "3. Settings → Security → Install unknown apps → allow Files app" >> $GITHUB_STEP_SUMMARY
          echo "4. Tap Install — done! 🎉" >> $GITHUB_STEP_SUMMARY
