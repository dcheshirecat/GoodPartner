window.storage={
  get:k=>new Promise((res,rej)=>{try{const v=localStorage.getItem(k);v===null?rej(new Error('not found')):res({key:k,value:v});}catch(e){rej(e);}}),
  set:(k,v)=>new Promise((res,rej)=>{try{localStorage.setItem(k,v);res({key:k,value:v});}catch(e){rej(e);}}),
  delete:k=>new Promise((res,rej)=>{try{localStorage.removeItem(k);res({key:k,deleted:true});}catch(e){rej(e);}}),
  list:p=>new Promise((res,rej)=>{try{const keys=Object.keys(localStorage).filter(k=>!p||k.startsWith(p));res({keys});}catch(e){rej(e);}})
};

const DEF={streak:0,lastSignIn:null,signedInToday:false,pts:0,totalPts:0,done:[],lateIds:[],todayTasks:[],taskHistory:[],customTasks:[],disabledPool:[],pinnedTasks:[],scheduleItems:[],themes:['sunny'],theme:'sunny',pets:[],pendingHatch:null,redeemCount:0,expandedPet:null};
let S={...DEF},curtab='home',petsubtab='nursery',tasksubtab='pool',aiLoading=false,showFormType=null;
let newCustom={em:'⭐',title:'',pts:15},newPinned={em:'📌',title:'',time:'Anytime',pts:5},newSched={em:'🏋️',title:'',timeFrom:'',timeTo:'',days:[]},hatchName='';

async function load(){
  try{const r=await window.storage.get(SK);if(r){const sv=JSON.parse(r.value);S=sv.lastSignIn!==td()?{...DEF,...sv,signedInToday:false,done:[],lateIds:[],todayTasks:[]}:{...DEF,...sv};}}catch(e){S={...DEF};}
  render();
}
async function save(){try{await window.storage.set(SK,JSON.stringify(S));}catch(e){}}
function th(){return THEMES[S.theme]||THEMES.sunny;}
function enabledPool(){
  const dis=new Set(S.disabledPool||[]);
  return[...BUILT_IN,...(S.customTasks||[])].filter(t=>!dis.has(t.id));
}

function getLvl(total){
  let lvl=1,needed=200,cum=0;
  while(cum+needed<=total){cum+=needed;lvl++;needed+=100;}
  return{lvl,cum,needed,progress:total-cum,pct:Math.round(((total-cum)/needed)*100),name:LVL_NAMES[Math.min(lvl-1,7)]};
}

function getBusySlots(){
  const dow=todayDow();
  return(S.scheduleItems||[])
    .filter(s=>s.days&&s.days.includes(dow)&&s.timeFrom&&s.timeTo)
    .map(s=>({start:toMins(s.timeFrom),end:toMins(s.timeTo)}))
    .sort((a,b)=>a.start-b.start);
}

function findFreeWindow(busy){
  const ps=420,pe=1320,WIN=120;
  const merged=[];
  for(const s of[...busy].sort((a,b)=>a.start-b.start)){
    if(merged.length&&s.start<=merged[merged.length-1].end)merged[merged.length-1].end=Math.max(merged[merged.length-1].end,s.end);
    else merged.push({...s});
  }
  let cursor=ps;
  for(const b of merged){
    if(b.start>pe)break;
    if(b.end<=ps)continue;
    if(b.start-cursor>=WIN)return{start:cursor,end:cursor+WIN};
    cursor=Math.max(cursor,b.end);
  }
  if(pe-cursor>=WIN)return{start:cursor,end:cursor+WIN};
  return null;
}

function assignTimeSlots(taskIds){
  const usedSlots=[...getBusySlots()];
  return taskIds.map(id=>{
    const slot=findFreeWindow(usedSlots);
    if(slot){usedSlots.push(slot);return{id,startMin:slot.start,endMin:slot.end};}
    return{id,startMin:null,endMin:null};
  });
}

function isLate(tSlot){return tSlot&&tSlot.endMin!=null&&nowMins()>tSlot.endMin;}
function isActive(tSlot){if(!tSlot||tSlot.startMin==null)return true;const n=nowMins();return n>=tSlot.startMin&&n<=tSlot.endMin;}

function pickDailyIds(count,exclude){
  const excSet=new Set(exclude||[]);
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
  const recent=new Set((S.taskHistory||[]).filter(h=>new Date(h.date)>=cutoff).map(h=>h.id));
  const pool=enabledPool().filter(t=>!excSet.has(t.id));
  const fresh=pool.filter(t=>!recent.has(t.id)).sort(()=>Math.random()-0.5);
  const old=pool.filter(t=>recent.has(t.id)).sort(()=>Math.random()-0.5);
  return[...fresh,...old].slice(0,count).map(t=>t.id);
}

function addPts(n){
  const old=S.totalPts||0;S.pts+=n;S.totalPts=old+n;
  if(getLvl(S.totalPts).lvl>getLvl(old).lvl)hatchEgg(getLvl(S.totalPts).lvl);
}

function signIn(){
  if(S.signedInToday){toast('Already checked in! 🌟','#43a047');return;}
  S.streak=S.lastSignIn===yd()?S.streak+1:1;
  S.lastSignIn=td();S.signedInToday=true;addPts(5);
  S.todayTasks=assignTimeSlots(pickDailyIds(2,[]));
  save();render();toast('Good morning! +5 pts 🎉');
}

function completeTask(id){
  if(!S.signedInToday){toast('Check in first!','#ffb347');return;}
  if(S.done.includes(id)){toast('Already done! ⭐','#43a047');return;}
  const tSlot=(S.todayTasks||[]).find(t=>t.id===id);
  const task=[...BUILT_IN,...(S.customTasks||[])].find(t=>t.id===id)||(S.pinnedTasks||[]).find(t=>t.id===id)||(S.scheduleItems||[]).find(t=>t.id===id);
  if(!task)return;
  const late=!!(tSlot&&isLate(tSlot));
  const basePts=task.halfPts?Math.max(1,Math.floor(task.pts/2)):(task.pts||0);
  const earned=late?Math.max(1,Math.floor(basePts*0.5)):basePts;
  S.done.push(id);
  if(late){S.lateIds=S.lateIds||[];S.lateIds.push(id);}
  if(earned>0)addPts(earned);
  S.taskHistory=S.taskHistory||[];S.taskHistory.push({id,date:td()});
  if(S.taskHistory.length>200)S.taskHistory=S.taskHistory.slice(-200);
  save();render();
  toast(late?`Late — half pts! +${earned} ${task.em}`:`+${earned} pts! ${task.em}`,late?'#ff9800':undefined);
}

async function askForMore(){
  if(!S.signedInToday){toast('Check in first!','#ffb347');return;}
  const todaySet=new Set((S.todayTasks||[]).map(t=>t.id));
  const available=enabledPool().filter(t=>!todaySet.has(t.id));
  if(!available.length){toast('No more tasks in your pool!','#43a047');return;}
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-14);
  const recent=(S.taskHistory||[]).filter(h=>new Date(h.date)>=cutoff).map(h=>h.id).join(',')||'none';
  const today=(S.todayTasks||[]).map(t=>enabledPool().find(x=>x.id===t.id)?.title||t.id).join(', ');
  const busy=getBusySlots().map(b=>`${fmtMins(b.start)}-${fmtMins(b.end)}`).join(', ')||'none';
  const prompt=`Pick ONE task ID that best complements today. Schedule busy: ${busy}.\nAvailable:\n${available.map(t=>`${t.id}|${t.em} ${t.title}|${t.pts}pts`).join('\n')}\nToday: ${today}\nRecent to avoid: ${recent}\nJSON only: {"id":"task_id"}`;
  aiLoading=true;render();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:60,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const parsed=JSON.parse((data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
    const task=enabledPool().find(t=>t.id===parsed.id);
    if(task&&!todaySet.has(task.id)){
      const usedSlots=[...getBusySlots(),...(S.todayTasks||[]).filter(t=>t.startMin).map(t=>({start:t.startMin,end:t.endMin}))];
      const slot=findFreeWindow(usedSlots);
      S.todayTasks=[...(S.todayTasks||[]),{id:task.id,startMin:slot?.start||null,endMin:slot?.end||null}];
      await save();toast(`Added: ${task.em} ${task.title}`);
    } else fallbackMore();
  }catch(e){fallbackMore();}
  aiLoading=false;render();
}

function fallbackMore(){
  const ids=pickDailyIds(1,(S.todayTasks||[]).map(t=>t.id));
  if(ids.length){const sl=assignTimeSlots(ids);S.todayTasks=[...(S.todayTasks||[]),...sl];save();toast('New task added!');}
  else toast('Pool is empty — enable more tasks!','#ff9800');
}

function togglePool(id){
  S.disabledPool=S.disabledPool||[];
  const i=S.disabledPool.indexOf(id);
  if(i>=0)S.disabledPool.splice(i,1);else S.disabledPool.push(id);
  save();render();
}

function savePinned(){
  if(!newPinned.title.trim()){toast('Add a name!','#ff9800');return;}
  const t={id:'pin_'+Date.now(),em:newPinned.em||'📌',title:newPinned.title.trim(),time:newPinned.time||'Anytime',pts:Math.max(1,Math.min(50,parseInt(newPinned.pts)||5)),halfPts:true,cat:'pinned',color:'#fff9c4',dot:'#f9a825'};
  S.pinnedTasks=[...(S.pinnedTasks||[]),t];newPinned={em:'📌',title:'',time:'Anytime',pts:5};showFormType=null;save();render();toast(`Pinned: ${t.em} ${t.title}`);
}
function deletePinned(id){S.pinnedTasks=(S.pinnedTasks||[]).filter(t=>t.id!==id);S.done=S.done.filter(d=>d!==id);save();render();}

function saveSched(){
  if(!newSched.title.trim()){toast('Add a name!','#ff9800');return;}
  if(!newSched.days.length){toast('Pick at least one day!','#ff9800');return;}
  const t={id:'sch_'+Date.now(),em:newSched.em||'📅',title:newSched.title.trim(),timeFrom:newSched.timeFrom,timeTo:newSched.timeTo,days:[...newSched.days],pts:0,cat:'schedule',color:'#e3f2fd',dot:'#42a5f5'};
  S.scheduleItems=[...(S.scheduleItems||[]),t];newSched={em:'🏋️',title:'',timeFrom:'',timeTo:'',days:[]};showFormType=null;save();render();toast(`Scheduled: ${t.em} ${t.title}`);
}
function deleteSched(id){S.scheduleItems=(S.scheduleItems||[]).filter(t=>t.id!==id);S.done=S.done.filter(d=>d!==id);save();render();}

function saveCustom(){
  if(!newCustom.title.trim()){toast('Add a name!','#ff9800');return;}
  const t={id:'c_'+Date.now(),em:newCustom.em||'⭐',title:newCustom.title.trim(),pts:Math.max(5,Math.min(50,parseInt(newCustom.pts)||15)),cat:'custom',color:'#fce4ec',dot:'#e91e63'};
  S.customTasks=[...(S.customTasks||[]),t];newCustom={em:'⭐',title:'',pts:15};showFormType=null;save();render();toast(`Added to pool: ${t.em}`);
}
function deleteCustom(id){S.customTasks=(S.customTasks||[]).filter(t=>t.id!==id);S.todayTasks=(S.todayTasks||[]).filter(x=>x.id!==id);S.done=S.done.filter(d=>d!==id);S.disabledPool=(S.disabledPool||[]).filter(d=>d!==id);save();render();}

function pickAnimal(lvl){
  const w=lvl>=7?[25,30,28,17]:lvl>=5?[35,30,25,10]:lvl>=3?[45,30,18,7]:[55,28,13,4];
  const roll=Math.random()*100;const r=roll<w[0]?1:roll<w[0]+w[1]?2:roll<w[0]+w[1]+w[2]?3:4;
  const pool=ANIMALS.filter(a=>a.rarity===r);return pool[Math.floor(Math.random()*pool.length)]||ANIMALS[0];
}
function hatchEgg(lvl){const animal=pickAnimal(lvl);hatchName=animal.name;S.pendingHatch={animalId:animal.id,level:lvl,rarity:animal.rarity,dateHatched:td()};curtab='egg';}
function confirmHatch(){
  if(!S.pendingHatch)return;
  const pet={id:'pet_'+Date.now(),...S.pendingHatch,name:(hatchName||'Friend').trim(),accessory:'none',background:'meadow',colorHue:0};
  S.pets=[...(S.pets||[]),pet];S.pendingHatch=null;save();render();toast(`${pet.name} joined your family! 🎉`,'#43a047');
}
function setPetProp(id,prop,val){const pet=(S.pets||[]).find(p=>p.id===id);if(pet){pet[prop]=prop==='colorHue'?parseInt(val):val;save();render();}}
function renamePet(id,name){const pet=(S.pets||[]).find(p=>p.id===id);if(pet){pet.name=name;save();}}
function togglePet(id){S.expandedPet=S.expandedPet===id?null:id;render();}
function setHatchName(v){hatchName=v;}

function redeem(id){
  const RW=[{id:'r1',em:'🍕',cost:80},{id:'r2',em:'🎮',cost:60},{id:'r3',em:'😴',cost:120},{id:'r4',em:'🎬',cost:50},{id:'r5',em:'🍺',cost:180},{id:'r6',em:'🎵',cost:30}];
  const rw=RW.find(r=>r.id===id);if(!rw)return;
  if(S.pts<rw.cost){toast(`Need ${rw.cost-S.pts} more pts!`,'#ff9800');return;}
  S.pts-=rw.cost;S.redeemCount=(S.redeemCount||0)+1;save();render();toast(`Enjoy it! ${rw.em}`,'#43a047');
}
function unlockTheme(id){
  const CM=[{id:'c1',thk:'berry',cost:80},{id:'c2',thk:'ocean',cost:80},{id:'c3',thk:'candy',cost:120}];
  const cm=CM.find(c=>c.id===id);if(!cm)return;
  if(S.themes.includes(cm.thk)){S.theme=cm.thk;save();render();toast('Theme applied! ✨','#ab47bc');return;}
  if(S.pts<cm.cost){toast(`Need ${cm.cost-S.pts} more pts!`,'#ff9800');return;}
  S.pts-=cm.cost;S.themes.push(cm.thk);S.theme=cm.thk;save();render();toast('Unlocked! 🎨','#ab47bc');
}
function toggleDay(d){const i=newSched.days.indexOf(d);if(i>=0)newSched.days.splice(i,1);else newSched.days.push(d);render();}
function setTab(t){curtab=t;showFormType=null;render();}
function setPsubtab(t){petsubtab=t;render();}
function setTsubtab(t){tasksubtab=t;showFormType=null;render();}

let _tt=null;
function toast(msg,col){
  col=col||th().ac;
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.cssText=`position:absolute;top:12px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:30px;font-size:13px;font-weight:800;z-index:30;white-space:nowrap;background:${col};color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.18);opacity:1;pointer-events:none;font-family:'Nunito',sans-serif`;
  if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>{const e=document.getElementById('toast');if(e)e.style.opacity='0';},2700);
}

function taskRow(task,tSlot,showPts=true){
  const t=th(),isDone=S.done.includes(task.id);
  const late=!isDone&&!!(tSlot&&isLate(tSlot));
  const active=!isDone&&!!(tSlot&&isActive(tSlot));
  const basePts=task.halfPts?Math.max(1,Math.floor(task.pts/2)):(task.pts||0);
  const lateEarned=Math.max(1,Math.floor(basePts*0.5));
  const displayPts=isDone?((S.lateIds||[]).includes(task.id)?lateEarned:basePts):(late?lateEarned:basePts);
  const ws=tSlot?.startMin!=null?`${fmtMins(tSlot.startMin)} – ${fmtMins(tSlot.endMin)}`:task.timeFrom&&task.timeTo?`${task.timeFrom}–${task.timeTo}`:task.time||'';
  return`<div class="tcard" onclick="completeTask('${task.id}')" style="background:${isDone?'#e8f5e9':late?'#fff3e0':task.color};border-color:${isDone?'#a5d6a750':late?'#ff980060':active?task.dot+'90':task.dot+'40'}${active&&!isDone?';box-shadow:0 0 0 2px '+task.dot+'35':''}">
    <div style="font-size:22px;width:28px;text-align:center;flex-shrink:0">${isDone?'✅':late?'⌛':task.em}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:800;font-size:12px;color:${isDone?'#43a047':late?'#bf360c':'#3a2a0a'};text-decoration:${isDone?'line-through':'none'};line-height:1.3">${task.title}${task.halfPts?'<span style="font-size:9px;color:#f9a825"> ½pts</span>':''}</div>
      <div style="font-size:10px;font-weight:700;margin-top:2px;display:flex;align-items:center;gap:5px">
        ${ws?`<span style="color:${late?'#ff9800':task.dot}">⏰ ${ws}</span>`:''}
        ${late&&!isDone?'<span style="color:#ff5722;font-weight:900;font-size:9px">LATE — half pts</span>':''}
        ${active&&!isDone?`<span style="color:${task.dot};font-weight:900;font-size:9px">● Now</span>`:''}
      </div>
    </div>
    ${showPts&&basePts>0?`<div style="font-size:11px;font-weight:900;color:${isDone?'#43a047':late?'#ff9800':task.dot};flex-shrink:0;text-align:right">${displayPts}pts</div>`:''}
  </div>`;
}

    const col=['','#ffb347','#42a5f5','#ab47bc','#ff6fb8'][S.pendingHatch.rarity];
    return`<div style="text-align:center;padding:6px 0">
      <div style="height:40px;position:relative;overflow:hidden;margin-bottom:6px">${['🌟','✨','🎊','💫','🌈','⭐','🎉','🥳'].map((e,i)=>`<span style="position:absolute;left:${6+i*12}%;top:0;font-size:15px;animation:conffall ${0.7+i*0.12}s ease-out ${i*0.08}s both">${e}</span>`).join('')}</div>
      <div style="font-size:68px;line-height:1;margin-bottom:10px;animation:hatchPop 0.65s cubic-bezier(.17,.67,.35,1.4)">${animal.em}</div>
      <div style="font-family:'Pacifico',cursive;font-size:20px;color:${col};margin-bottom:4px">A new friend hatched!</div>
      <div style="font-size:11px;color:${t.sub};margin-bottom:14px">${'⭐'.repeat(S.pendingHatch.rarity)} · Level ${S.pendingHatch.level}</div>
      <div style="font-size:10px;font-weight:900;color:${t.sub};text-transform:uppercase;margin-bottom:5px">Give them a name</div>
      <input class="inp" value="${hatchName}" oninput="setHatchName(this.value)" style="text-align:center;font-size:15px;margin-bottom:14px">
      <button class="abtn" onclick="confirmHatch()" style="background:${t.grad};color:#fff;font-size:15px;padding:12px 28px;border-radius:30px;box-shadow:0 4px 18px rgba(255,111,184,0.28)">Welcome home! 🎉</button>
    </div>`;
  }
  const pct=li.pct,stage=pct<30?0:pct<60?1:pct<85?2:3;
  const msg=pct<30?'Resting quietly…':pct<60?'Something stirs inside 🌀':pct<85?'Cracks are forming! ✨':'Any moment now! 🥚';
  const pal=[['#ffeaa7','#fdcb6e','#f0b800'],['#ff9de2','#fd79a8','#e84393'],['#a29bfe','#6c5ce7','#4b3fc7'],['#ff7675','#ff3d3d','#e01010']];
  const [l,m,d]=pal[stage],ws=stage===3?'animation:wobble 0.55s ease-in-out infinite':'animation:float 3s ease-in-out infinite';
  const wPcts=li.lvl>=7?[25,30,28,17]:li.lvl>=5?[35,30,25,10]:li.lvl>=3?[45,30,18,7]:[55,28,13,4];
  return`<div style="text-align:center;margin-bottom:10px">
    <div style="font-family:'Pacifico',cursive;font-size:16px;color:${t.ac}">${li.name}</div>
    <div style="font-size:11px;color:${t.sub};margin-top:2px">Level ${li.lvl}</div>
    <div style="background:#f0e0d0;border-radius:30px;height:9px;margin:7px 28px 3px;overflow:hidden"><div style="background:${t.grad};height:100%;width:${pct}%;border-radius:30px;transition:width 0.5s"></div></div>
    <div style="font-size:11px;color:${t.sub};font-weight:800">${li.progress}/${li.needed} pts to next level</div>
  </div>
  <div style="text-align:center;margin-bottom:8px"><div style="display:inline-block;${ws}">
    <svg viewBox="0 0 120 152" width="108" height="136">
      <defs><radialGradient id="eg" cx="38%" cy="30%"><stop offset="0%" stop-color="${l}"/><stop offset="60%" stop-color="${m}"/><stop offset="100%" stop-color="${d}"/></radialGradient></defs>
      <path d="M60,7 C34,7 8,47 8,83 C8,119 30,147 60,147 C90,147 112,119 112,83 C112,47 86,7 60,7 Z" fill="url(#eg)" stroke="${d}" stroke-width="1.5"/>
      <ellipse cx="43" cy="45" rx="11" ry="17" fill="white" opacity="0.4"/>
      ${stage>=1?'<path d="M50,37 L45,51 L52,56 L47,68" stroke="#5d4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>':''}
      ${stage>=2?'<path d="M79,73 L72,80 L77,89 L69,97" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>':''}
      ${stage>=3?'<path d="M34,88 L40,82 L37,76" stroke="#5d4037" stroke-width="1.5" fill="none" stroke-linecap="round"/><text x="60" y="126" text-anchor="middle" font-size="17">👀</text>':''}
    </svg>
  </div></div>
  <div style="text-align:center;font-size:12px;font-weight:800;color:${t.sub};margin-bottom:11px">${msg}</div>
  <div style="background:${t.card};border:2px solid ${t.bdr};border-radius:12px;padding:11px 13px">
    <div style="font-size:9px;font-weight:900;color:${t.sub};text-transform:uppercase;margin-bottom:7px">Rarity chances at Level ${li.lvl}</div>
    ${[[1,'⭐','Common',wPcts[0],'#ffb347'],[2,'⭐⭐','Uncommon',wPcts[1],'#42a5f5'],[3,'⭐⭐⭐','Rare',wPcts[2],'#ab47bc'],[4,'⭐⭐⭐⭐','Legendary',wPcts[3],'#ff6fb8']].map(([r,s,lb,p,col])=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px"><div style="font-size:10px;min-width:80px;font-weight:800;color:${col}">${s} ${lb}</div><div style="flex:1;background:#f0e0d0;border-radius:30px;height:6px;overflow:hidden"><div style="background:${col};height:100%;width:${p}%;border-radius:30px"></div></div><div style="font-size:10px;font-weight:900;color:${t.sub};min-width:24px;text-align:right">${p}%</div></div>`).join('')}
  </div>`;
}

function nurseryHTML(t){
  const pets=S.pets||[],unlocked=ACHIEVEMENTS.filter(a=>a.check(S)).length;
  const seg=`<div class="seg"><button onclick="setPsubtab('nursery')" style="background:${petsubtab==='nursery'?t.ac:'transparent'};color:${petsubtab==='nursery'?'#fff':t.sub}">🐾 Nursery (${pets.length})</button><button onclick="setPsubtab('book')" style="background:${petsubtab==='book'?t.ac:'transparent'};color:${petsubtab==='book'?'#fff':t.sub}">📖 Book (${unlocked}/${ACHIEVEMENTS.length})</button></div>`;
  if(petsubtab==='book'){
    const done=ACHIEVEMENTS.filter(a=>a.check(S)),todo=ACHIEVEMENTS.filter(a=>!a.check(S));
    return seg+done.map(a=>`<div style="background:#e8f5e9;border:2px solid #a5d6a7;border-radius:12px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px"><div style="font-size:20px">${a.icon}</div><div style="flex:1"><div style="font-weight:900;font-size:12px;color:#2e7d32">${a.title}</div><div style="font-size:10px;color:#43a047">${a.desc}</div></div><div>✅</div></div>`).join('')+
    todo.map(a=>`<div style="background:${t.card};border:2px solid ${t.bdr};border-radius:12px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px;opacity:0.45"><div style="font-size:20px;filter:grayscale(1)">${a.icon}</div><div style="flex:1"><div style="font-weight:900;font-size:12px;color:${t.sub}">${a.title}</div><div style="font-size:10px;color:${t.sub}">${a.desc}</div></div><div>🔒</div></div>`).join('');
  }
  if(!pets.length)return seg+`<div style="text-align:center;padding:24px 0 14px"><div style="font-size:44px;margin-bottom:8px">🥚</div><div style="font-family:'Pacifico',cursive;font-size:16px;color:${t.ac};margin-bottom:6px">Your nursery is empty</div><div style="font-size:13px;color:${t.sub};line-height:1.7">Level up to hatch your first pet!<br>Check the Egg tab to see progress.</div></div>`;
  const petCard=pet=>{
    const animal=ANIMALS.find(a=>a.id===pet.animalId)||{em:'🐣'};
    const acc=ACCESSORIES.find(a=>a.id===(pet.accessory||'none'));
    const bg=BACKGROUNDS.find(b=>b.id===(pet.background||'meadow'))||BACKGROUNDS[0];
    const rarCol=['','#ffb347','#42a5f5','#ab47bc','#ff6fb8'][pet.rarity],exp=S.expandedPet===pet.id;
    return`<div style="border-radius:12px;overflow:hidden;border:2px solid ${rarCol}50;cursor:pointer" onclick="togglePet('${pet.id}')">
      <div style="background:${bg.grad};height:68px;display:flex;align-items:center;justify-content:center;position:relative">
        <div style="font-size:36px;filter:hue-rotate(${pet.colorHue||0}deg)">${animal.em}</div>
        ${acc&&acc.id!=='none'?`<div style="position:absolute;top:3px;right:4px;font-size:14px">${acc.em}</div>`:''}
      </div>
      <div style="background:${t.card};padding:5px 7px">
        <div style="font-weight:900;font-size:11px;color:${t.tx};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${pet.name}</div>
        <div style="font-size:9px;color:${rarCol}">${'⭐'.repeat(pet.rarity)}</div>
      </div>
      ${exp?`<div style="background:${t.bg};padding:7px;border-top:2px solid ${t.bdr}" onclick="event.stopPropagation()">
        <input class="inp" value="${pet.name}" oninput="renamePet('${pet.id}',this.value)" style="margin-bottom:5px;font-size:11px;padding:5px 7px">
        <div style="font-size:8px;font-weight:900;color:${t.sub};text-transform:uppercase;margin-bottom:3px">Accessory</div>
        <div style="display:flex;gap:2px;flex-wrap:wrap;margin-bottom:5px">${ACCESSORIES.map(a=>`<button onclick="event.stopPropagation();setPetProp('${pet.id}','accessory','${a.id}')" style="padding:2px 4px;border-radius:5px;border:1.5px solid ${(pet.accessory||'none')===a.id?rarCol:t.bdr};background:${(pet.accessory||'none')===a.id?rarCol+'22':'transparent'};cursor:pointer;font-size:${a.em?'11px':'9px'};font-weight:800;font-family:inherit;color:${t.tx}">${a.em||a.label}</button>`).join('')}</div>
        <div style="font-size:8px;font-weight:900;color:${t.sub};text-transform:uppercase;margin-bottom:3px">Habitat</div>
        <div style="display:flex;gap:2px;flex-wrap:wrap;margin-bottom:5px">${BACKGROUNDS.map(b=>`<button onclick="event.stopPropagation();setPetProp('${pet.id}','background','${b.id}')" style="padding:2px 4px;border-radius:5px;border:1.5px solid ${(pet.background||'meadow')===b.id?rarCol:t.bdr};background:${(pet.background||'meadow')===b.id?rarCol+'22':'transparent'};cursor:pointer;font-size:9px;font-weight:800;font-family:inherit;color:${t.tx}">${b.label}</button>`).join('')}</div>
        <div style="font-size:8px;font-weight:900;color:${t.sub};text-transform:uppercase;margin-bottom:3px">Tint</div>
        <div style="display:flex;gap:2px;flex-wrap:wrap">${HUES.map(h=>`<button onclick="event.stopPropagation();setPetProp('${pet.id}','colorHue',${h.hue})" style="padding:2px 4px;border-radius:5px;border:1.5px solid ${(pet.colorHue||0)===h.hue?rarCol:t.bdr};background:${(pet.colorHue||0)===h.hue?rarCol+'22':'transparent'};cursor:pointer;font-size:9px;font-weight:800;font-family:inherit;color:${t.tx}">${h.label}</button>`).join('')}</div>
      </div>`:''}
    </div>`;
  };
  return seg+`<div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px">${pets.map(petCard).join('')}</div>`;
}

function vaultHTML(t){
  const RW=[{id:'r1',em:'🍕',title:'Order food tonight',cost:80,desc:'Skip cooking, earned it.'},{id:'r2',em:'🎮',title:'Gaming session (1 hr)',cost:60,desc:'One guilt-free hour.'},{id:'r3',em:'😴',title:'Sleep in Saturday',cost:120,desc:'She handles the morning.'},{id:'r4',em:'🎬',title:'Movie pick tonight',cost:50,desc:'Your choice on the TV.'},{id:'r5',em:'🍺',title:'Night out with friends',cost:180,desc:'An evening out, earned.'},{id:'r6',em:'🎵',title:'Loud music in the car',cost:30,desc:'Your playlist, full volume.'}];
  const CM=[{id:'c1',thk:'berry',cost:80,desc:'Purple & pink vibes.'},{id:'c2',thk:'ocean',cost:80,desc:'Teal & green cool-down.'},{id:'c3',thk:'candy',cost:120,desc:'Hot pink & orange energy.'}];
  return`<div style="background:${t.grad};border-radius:14px;padding:12px 16px;margin-bottom:12px;text-align:center">
    <div style="font-size:9px;font-weight:900;letter-spacing:0.12em;color:rgba(255,255,255,0.85);text-transform:uppercase">Your Points</div>
    <div style="font-family:'Pacifico',cursive;font-size:32px;color:#fff;line-height:1.2">${S.pts}<span style="font-size:16px"> pts</span></div>
  </div>
  <div style="font-size:9px;font-weight:900;letter-spacing:0.12em;color:${t.sub};text-transform:uppercase;margin-bottom:7px">🎁 Reward Permissions</div>
  ${RW.map(r=>`<div style="background:#fff;border:2px solid ${t.bdr};border-radius:12px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:9px">
    <div style="font-size:22px">${r.em}</div>
    <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:12px;color:${t.tx}">${r.title}</div><div style="font-size:10px;color:${t.sub}">${r.desc}</div></div>
    <button class="abtn" onclick="redeem('${r.id}')" style="padding:7px 11px;background:${S.pts>=r.cost?t.grad:'#eee'};color:${S.pts>=r.cost?'#fff':'#aaa'};font-size:12px;border-radius:9px;flex-shrink:0">${r.cost}✦</button>
  </div>`).join('')}
  <div style="font-size:9px;font-weight:900;letter-spacing:0.12em;color:${t.sub};text-transform:uppercase;margin:10px 0 7px">🎨 App Themes</div>
  ${CM.map(c=>{const owned=S.themes.includes(c.thk),active=S.theme===c.thk,th2=THEMES[c.thk];return`<div style="background:#fff;border:2px solid ${active?t.ac:t.bdr};border-radius:12px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:9px">
    <div style="width:32px;height:32px;border-radius:8px;background:${th2.grad};flex-shrink:0"></div>
    <div style="flex:1"><div style="font-weight:800;font-size:12px;color:${t.tx}">${th2.name}</div><div style="font-size:10px;color:${t.sub}">${c.desc}</div></div>
    <button class="abtn" onclick="unlockTheme('${c.id}')" style="padding:7px 11px;background:${active?t.grad:owned?'#e8f5e9':'#eee'};color:${active?'#fff':owned?'#43a047':'#aaa'};font-size:12px;border-radius:9px;flex-shrink:0">${active?'On':owned?'Use':c.cost+'✦'}</button>
  </div>`;}).join('')}`;
}

function render(){
  const t=th(),date=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}),li=getLvl(S.totalPts||0);
  const tabs=[['home','🏠','Home'],['tasks','📋','Tasks'],['egg','🥚','Egg'],['pets','🐾','Pets'],['shop','🎁','Vault']];
  document.getElementById('app').style.background=t.bg;
  document.getElementById('app').innerHTML=`
    <div style="background:${t.grad};padding:13px 18px 11px;flex-shrink:0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-family:'Pacifico',cursive;font-size:19px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.1)">Good Partner</div>
          <div style="font-size:9px;font-weight:900;color:rgba(255,255,255,0.82);letter-spacing:0.09em;margin-top:2px;text-transform:uppercase">${date}</div>
        </div>
        <div style="display:flex;gap:8px">
          <div style="text-align:center;background:rgba(255,255,255,0.25);border-radius:10px;padding:4px 9px">
            <div style="font-family:'Pacifico',cursive;font-size:18px;color:#fff;line-height:1">${S.streak}</div>
            <div style="font-size:7px;font-weight:900;color:rgba(255,255,255,0.88);text-transform:uppercase">🔥streak</div>
          </div>
          <div style="text-align:center;background:rgba(255,255,255,0.25);border-radius:10px;padding:4px 9px">
            <div style="font-family:'Pacifico',cursive;font-size:18px;color:#fff;line-height:1">${S.pts}</div>
            <div style="font-size:7px;font-weight:900;color:rgba(255,255,255,0.88);text-transform:uppercase">✦pts Lv${li.lvl}</div>
          </div>
        </div>
      </div>
    </div>
    <div id="content" class="fi" style="background:${t.bg}">${curtab==='home'?homeHTML(t):curtab==='tasks'?tasksHTML(t):curtab==='egg'?eggHTML(t):curtab==='pets'?nurseryHTML(t):vaultHTML(t)}</div>
    <div style="display:flex;justify-content:space-around;padding:8px 0 11px;flex-shrink:0;background:${t.nav};border-top:2px solid ${t.bdr}60">
      ${tabs.map(([k,ic,lb])=>`<button class="nbtn" onclick="setTab('${k}')" style="color:${curtab===k?t.ac:t.sub}">
        <span style="font-size:17px;line-height:1">${ic}</span>
        <span style="font-size:8px;font-weight:900;letter-spacing:0.07em;text-transform:uppercase">${lb}</span>
      </button>`).join('')}
    </div>`;
}
load();
</script>
</body>
</html>
